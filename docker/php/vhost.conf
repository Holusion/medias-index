<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        # Production runs on OVH shared hosting where .htaccess is the only
        # available configuration mechanism, so the dev vhost must honour the
        # very same files.
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
