name: test & deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  # Never let two deployments write to the hosting space at once.
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    # Without a database the migration tests would silently skip, which is the
    # same as not having written them.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: medias_index_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      MEDIAS_INDEX_TEST_DSN: mysql:host=127.0.0.1;port=3306;dbname=medias_index_test;charset=utf8mb4
      MEDIAS_INDEX_TEST_USER: root
      MEDIAS_INDEX_TEST_PASSWORD: root

    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          # Lowest version the app supports, so CI catches anything that needs
          # a newer one. The host may well run something more recent.
          php-version: '8.2'
          extensions: pdo, pdo_mysql, gd, json, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Validate composer files
        run: composer validate --strict

      - name: Tests
        run: vendor/bin/phpunit

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: medias.holusion.com
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, gd, json, mbstring
          coverage: none

      - name: Install runtime dependencies only
        # --no-dev is the whole reason vendor/ is not committed: PHPUnit and its
        # ~25 transitive packages never reach the hosting space.
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Stage the deployment payload
        # An allowlist rather than a list of exclusions: what is not named here
        # cannot reach the server, so adding a directory to the repository is
        # safe by default. dist/ is exactly the intended state of www/app/.
        run: |
          mkdir -p dist/config
          cp -r public src templates db bin vendor dist/
          cp composer.json composer.lock .htaccess dist/
          cp config/config.example.php dist/config/

      - name: Upload to OVH
        # With --no-dev the payload is under a hundred files, so there is
        # nothing to gain from incremental transfer: every deploy mirrors the
        # whole tree and the result never depends on remembered state.
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_KEY: ${{ secrets.SFTP_KEY }}
          # ssh-keyscan -t ed25519 <host>. Without it a machine in the path
          # could take the deployment; the run fails rather than trusting blind.
          SFTP_HOST_KEY: ${{ secrets.SFTP_HOST_KEY }}
        run: |
          # --delete below would empty www/app if staging had silently produced
          # nothing, and this deployment is the only way back.
          test -f dist/public/index.php

          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends lftp

          install -d -m 700 ~/.ssh
          printf '%s\n' "$SFTP_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SFTP_HOST_KEY" > ~/.ssh/known_hosts

          # --delete drops whatever is no longer in the repository, including
          # the .deploy-state.json left behind by the previous deploy action.
          # Nothing on the host lives inside app/: the configuration sits above
          # the document root and files/ and thumbs/ are siblings of app/.
          # The exception is .ssh: the deploy account is jailed to app/, which is
          # therefore also its home, so its authorized_keys sits in the mirrored
          # tree. Exclusions protect against deletion as well as upload.
          # The password is a placeholder that is never sent: authentication
          # happens inside connect-program, with the key. lftp still refuses to
          # open the connection without one, falling back to anonymous login.
          lftp -c "
            set cmd:fail-exit yes;
            set net:max-retries 2;
            set sftp:connect-program 'ssh -a -x -i ~/.ssh/deploy_key -o IdentitiesOnly=yes';
            open -u \"$SFTP_USER\",unused sftp://$SFTP_HOST;
            mirror --reverse --delete --parallel=4 --verbose --exclude '^\.ssh' dist/ ~/;
          "
